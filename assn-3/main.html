<!doctype html>
<html>

<head>
  <title>Sooubway Order System</title>
  <link rel="stylesheet" href="main.css" />
  <script src="main.js" defer></script>
  <script src="drink.js" defer></script>
  <script src="order.js" defer></script>
  <script src="sandwich.js" defer></script>
  <script src="sides.js" defer></script>
</head>

<body>
  <table>
    <thead>
      <tr>
        <th class="placement sub-headers">Order Placement</th>
        <th class="fulfillment headers">Pending Status</th>
        <th class="completed sub-headers">Completed</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="placement">
          <form id="orderForm">
            <h3>Select Size</h3>
            <div>
              <label><input type="radio" name="size" value="6in" required /> 6-inch</label>
            </div>
            <div>
              <label><input type="radio" name="size" value="footlong" />12-inch</label>
            </div>
            <div>
              <label><input type="radio" name="size" value="12in" />18-inch</label>
            </div>

            <h3>Select Bread</h3>
            <div>
              <label><input type="radio" name="bread" value="white" required />White</label>
            </div>
            <div>
              <label><input type="radio" name="bread" value="wheat" />Wheat</label>
            </div>
            <div>
              <label><input type="radio" name="bread" value="italian" />Italian</label>
            </div>
            <div>
              <label><input type="radio" name="bread" value="multigrain" />Multigrain</label>
            </div>

            <h3>Main Ingredient</h3>
            <div>
              <label><input type="radio" name="main" value="turkey" required />Turkey</label>
            </div>
            <div>
              <label><input type="radio" name="main" value="ham" />Ham</label>
            </div>
            <div>
              <label><input type="radio" name="main" value="roast beef" />Roast Beef</label>
            </div>
            <div>
              <label><input type="radio" name="main" value="chicken" />Chicken</label>
            </div>
            <div>
              <label><input type="radio" name="main" value="meatball" />Meatball</label>
            </div>
            <div>
              <label><input type="radio" name="main" value="veggie" />Veggie</label>
            </div>

            <h3>Cheese</h3>
            <div>
              <label><input type="radio" name="cheese" value="american" required />American</label>
            </div>
            <div>
              <label><input type="radio" name="cheese" value="provolone" />Provolone</label>
            </div>
            <div>
              <label><input type="radio" name="cheese" value="swiss" />Swiss</label>
            </div>
            <div>
              <label><input type="radio" name="cheese" value="cheddar" />Cheddar</label>
            </div>

            <h3>Toppings</h3>
            <div>
              <label><input type="checkbox" name="toppings" value="lettuce" />Lettuce</label>
            </div>
            <div>
              <label><input type="checkbox" name="toppings" value="tomato" />Tomato</label>
            </div>
            <div>
              <label><input type="checkbox" name="toppings" value="onion" />Onion</label>
            </div>
            <div>
              <label><input type="checkbox" name="toppings" value="pickles" />Pickles</label>
            </div>
            <div>
              <label><input type="checkbox" name="toppings" value="peppers" />Peppers</label>
            </div>
            <div>
              <label><input type="checkbox" name="toppings" value="olives" />Olives</label>
            </div>
            <div>
              <label><input type="checkbox" name="toppings" value="mayo" />Mayo</label>
            </div>
            <div>
              <label><input type="checkbox" name="toppings" value="mustard" />Mustard</label>
            </div>

            <h3>Drink</h3>
            <div>
              <label><input type="radio" name="drink" value="none" checked />None</label>
            </div>
            <div>
              <label><input type="radio" name="drink" value="coke" />Cola</label>
            </div>
            <div>
              <label><input type="radio" name="drink" value="diet-coke" />Coffee</label>
            </div>
            <div>
              <label><input type="radio" name="drink" value="sprite" />Juice</label>
            </div>
            <div>
              <label><input type="radio" name="drink" value="water" />Water</label>
            </div>
            <div>
              <label><input type="radio" name="drink" value="tea" />Tea</label>
            </div>

            <h3>Side</h3>
            <div>
              <label><input type="checkbox" name="sides" value="chips" />Chips</label>
            </div>
            <div>
              <label><input type="checkbox" name="sides" value="carrots" />Carrots</label>
            </div>
            <div>
              <label><input type="checkbox" name="sides" value="cookie" />Cookie</label>
            </div>

            <div>
              <button type="submit">Submit Order</button>
            </div>
          </form>
        </td>
        <td class="fulfillment">
          <table>
            <thead>
              <tr>
                <th class="green sub-headers">New</th>
                <th class="yellow sub-headers">Waiting</th>
                <th class="red sub-headers">Hurry Up</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td id="new"><!-- injected w/ JS --></td>
                <td id="waiting">
                  <!-- injected w/ JS -->
                </td>
                <td id="hurry">
                  <!-- injected w/ JS -->
                </td>
              </tr>
            </tbody>
          </table>
        </td>
        <td id="completed"><!-- injected w/ JS --></td>
      </tr>
    </tbody>
  </table>
</body>

</html>
