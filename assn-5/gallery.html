<!DOCTYPE html>
<html>
<head>
    <title>Favorite Favorites - Gallery</title>
    <link rel="stylesheet" href="gallery.css">
    <script src="gallery.js" defer></script>
</head>
<body data-theme="light">
    <script>
        // prevent flash of unstyled theme
        const themeParts = window.location.search.split("theme=");
        if (themeParts[1]) {
            document.body.dataset.theme = themeParts[1];
        }
    </script>
    <div id="navbar">
        <div id="nav-links">
            <a id="home-link" href="index.html">Home</a>
            <span class="active-link">Gallery</span>
        </div>
        <div id="theme-selector">
            <span>Theme: </span>
            <label><input class="theme-radio" type="radio" name="theme-radio" value="light" checked />Light</label>
            <label><input class="theme-radio" type="radio" name="theme-radio" value="dark" />Dark Mode</label>
            <label><input class="theme-radio" type="radio" name="theme-radio" value="neon" />Neon Mode</label>
        </div>
    </div>
    
    <div id="main-content">
        <h1>Your Favorites Gallery</h1>
        <div id="categories">
            <span>Filter by Category: </span>
            <label><input class="filter-radio" type="radio" name="filter-radio" value="all" checked />All</label>
            <label><input class="filter-radio" type="radio" name="filter-radio" value="nature" />Nature</label>
            <label><input class="filter-radio" type="radio" name="filter-radio" value="space" />Space</label>
            <label><input class="filter-radio" type="radio" name="filter-radio" value="anime" />Anime</label>
        </div>
        
        <div id="gallery-container">
        </div>
    </div>
</body>
</html>
